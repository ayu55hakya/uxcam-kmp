# Publishes the UXCamKMP iOS XCFramework via KMMBridge (SPM distribution).
#
# What it does on each run:
#   1. Builds the release XCFramework for iosArm64 + iosSimulatorArm64.
#   2. Zips it and uploads it as a GitHub Release asset on the repo configured in
#      uxcam/build.gradle.kts (gitHubReleaseArtifacts) — currently ayu55hakya/uxcam-kmp.
#   3. Rewrites the url/checksum in the Package.swift VARIABLES BLOCK, commits it, and tags
#      the release so SPM consumers can resolve `.package(url: ".../uxcam-kmp", from: "<version>")`.
#
# Release flow: bump `version` in uxcam/build.gradle.kts, merge, then run this workflow
# (Actions tab -> "Publish iOS Framework (SPM)" -> Run workflow). KMMBridge creates the tag +
# GitHub Release itself, so do NOT trigger this on tag pushes.
#
# Why these inputs are set the way they are (verified against KMMBridge 1.2.1 source):
#   - ENABLE_PUBLISHING=true        registers the gated `kmmBridgePublish` task.
#   - GITHUB_PUBLISH_TOKEN          is read via `project.property(...)`, which does NOT read plain
#                                   env vars — it must arrive as a Gradle PROJECT PROPERTY. The
#                                   ORG_GRADLE_PROJECT_ env prefix is Gradle's standard way to do
#                                   that, so a plain `GITHUB_PUBLISH_TOKEN:` env would fail with
#                                   "Could not get unknown property 'GITHUB_PUBLISH_TOKEN'".
name: Publish iOS Framework (SPM)

on:
  workflow_dispatch:
    inputs:
      notes:
        description: "Release notes / reason (informational; version comes from build.gradle.kts)"
        required: false

# Never run two publishes at once — they both tag/commit to this repo.
concurrency:
  group: publish-ios
  cancel-in-progress: false

# Needed for KMMBridge to create the GitHub Release and push the tag + Package.swift commit.
permissions:
  contents: write

jobs:
  publish:
    # macOS: required for the Kotlin/Native iOS link + the CocoaPods cinterop step that binds
    # the native UXCam SDK, and for assembling the XCFramework.
    runs-on: macos-14
    steps:
      - name: Checkout (full history so KMMBridge can read tags/versioning)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # persist-credentials defaults to true, so the token is configured for the git
          # push this workflow makes (the rewritten Package.swift commit + the moved tag).

      - name: Configure git identity (this workflow commits the rewritten Package.swift)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Select latest stable Xcode (Swift toolchain for XCFramework + SPM)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Set up Gradle (with build cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Publish XCFramework + rewrite Package.swift (on the runner only)
        env:
          # Injected as a Gradle project property (see file header). secrets.GITHUB_TOKEN has
          # contents:write on this repo, which covers creating the release + uploading the asset.
          # Works only because gitHubReleaseArtifacts targets the SAME repo Actions runs in
          # (ayu55hakya/uxcam-kmp). If you point it at a different repo, swap for a PAT secret.
          ORG_GRADLE_PROJECT_GITHUB_PUBLISH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # kmmBridgePublish builds + uploads the XCFramework to a GitHub Release (which auto-creates
        # the tag at the CURRENT commit) and rewrites Package.swift's url/checksum — but ONLY in the
        # runner's working tree. KMMBridge does NOT commit/push; the next step does.
        # --no-configuration-cache: the upload runs in doLast and isn't CC-safe (CC is on by default).
        run: ./gradlew :uxcam:kmmBridgePublish -PENABLE_PUBLISHING=true --no-configuration-cache

      - name: Commit the rewritten Package.swift and move the tag onto it
        # The release auto-created the tag at the pre-rewrite commit, so SPM consumers resolving
        # `from: <version>` would otherwise get the placeholder url. Commit the rewritten file and
        # force the tag onto that commit. The release asset URL keys on the tag NAME (not the
        # commit), so moving the tag keeps the binary link valid.
        run: |
          set -euo pipefail
          VERSION="$(grep -E '^version[[:space:]]*=[[:space:]]*"' uxcam/build.gradle.kts | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "Publishing version: $VERSION"
          if git diff --quiet -- Package.swift; then
            echo "::error::Package.swift was not rewritten — kmmBridgePublish did not update url/checksum. Aborting."
            exit 1
          fi
          git add Package.swift
          git commit -m "Release $VERSION [skip ci]"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git tag -f "$VERSION"
          git push -f origin "refs/tags/$VERSION"
          echo "Tag $VERSION now points at the commit containing the real Package.swift url/checksum."
